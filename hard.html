<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hard</title>
<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Overpass',sans-serif; color:white; background:#0f0f14; overflow:hidden; }

.bg {
  position:fixed; inset:0;
  background: radial-gradient(circle, rgba(255,60,0,0.3), transparent 60%);
  filter:blur(18px);
  animation:jitter 0.3s infinite;
  z-index:-1;
}

@keyframes jitter {
  0%{transform:translate(0,0)}
  25%{transform:translate(4px,-3px)}
  50%{transform:translate(-4px,3px)}
  75%{transform:translate(2px,2px)}
}

.container { max-width:700px; margin:auto; padding:60px 30px; }
.card { background:rgba(255,255,255,0.04); border-radius:18px; padding:30px; backdrop-filter:blur(10px); }

a { color:rgba(255,255,255,0.7); text-decoration:none }
a:hover { color:white }

.tag { margin-top:10px; display:inline-block; padding:6px 12px; border-radius:999px; background:rgba(255,60,0,0.3); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
<a href="chart.html">← Back</a>
<div class="card">
<h1>Hard</h1>
<div class="tag">Tier: 3 (Middleline)</div>
<p>tagline placeholder</p>
<ul><li>Parkour 10</li></ul>
</div>
</div>
</body>
</html>
