<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moderate</title>
<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Overpass',sans-serif;
  color:white;
  background:#0f0f14;
  overflow:hidden;
}

.bg {
  position:fixed;
  inset:0;
  background:
    repeating-linear-gradient(45deg, rgba(255,220,120,0.12) 0px, transparent 30px);
  animation:slide 4s linear infinite;
  filter:blur(12px);
  z-index:-1;
}

@keyframes slide {
  0% { transform:translate(0,0) }
  100% { transform:translate(-40px,-40px) }
}

.container { max-width:700px; margin:auto; padding:60px 30px; }
.card {
  background:rgba(255,255,255,0.04);
  border-radius:18px;
  padding:30px;
  backdrop-filter:blur(10px);
}

a { color:rgba(255,255,255,0.7); text-decoration:none }
a:hover { color:white }

.tag {
  margin-top:10px;
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,220,120,0.25);
}
</style>
</head>

<body>
<div class="bg"></div>

<div class="container">
<a href="index.html">← Back</a>

<div class="card">
<h1>Moderate</h1>
<div class="tag">Tier: 2 (Baseline)</div>

<p>tagline placeholder</p>

<ul><li>Parkour 5</li></ul>
</div>
</div>

</body>
</html>
