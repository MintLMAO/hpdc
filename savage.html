<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Savage</title>
<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Overpass'; color:white; background:#0f0f14; overflow:hidden; }

.bg {
  position:fixed; inset:0;
  background: radial-gradient(circle, rgba(80,0,150,0.35), transparent 70%);
  animation:warp 0.6s infinite alternate;
  filter:blur(18px);
}

@keyframes warp {
  0%{transform:scale(1) skewX(0deg)}
  100%{transform:scale(1.2) skewX(10deg)}
}

.container { max-width:700px; margin:auto; padding:60px 30px; }
.card { background:rgba(255,255,255,0.04); border-radius:18px; padding:30px; backdrop-filter:blur(10px); }

a { color:rgba(255,255,255,0.7); text-decoration:none }
a:hover { color:white }

.tag { margin-top:10px; padding:6px 12px; border-radius:999px; background:rgba(80,0,150,0.35); display:inline-block; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
<a href="index.html">← Back</a>
<div class="card">
<h1>Savage</h1>
<div class="tag">Tier: 3 (Middleline)</div>
<p>tagline placeholder</p>
<ul><li>Parkour 15</li></ul>
</div>
</div>
</body>
</html>
