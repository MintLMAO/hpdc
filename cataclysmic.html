<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cataclysmic</title>

<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Overpass',sans-serif;
  color:white;
  background:#000;
  overflow:hidden;
}

/* 🌍 WORLD-SHATTERING GRAYSCALE APOCALYPSE */
.bg {
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15), transparent 40%),
    repeating-conic-gradient(
      from 0deg,
      rgba(255,255,255,0.05) 0deg,
      transparent 10deg
    );
  filter: grayscale(1) contrast(250%) brightness(0.6);
  animation:
    quake 0.25s infinite,
    collapse 1s infinite alternate;
  z-index:-3;
}

@keyframes quake {
  0% { transform:translate(0,0); }
  25% { transform:translate(4px,-3px); }
  50% { transform:translate(-5px,2px); }
  75% { transform:translate(3px,4px); }
  100% { transform:translate(0,0); }
}

@keyframes collapse {
  0% { filter:grayscale(1) contrast(250%) brightness(0.7); }
  50% { filter:grayscale(1) contrast(400%) brightness(0.4); }
  100% { filter:grayscale(1) contrast(250%) brightness(0.7); }
}

/* 💀 broken structure glitch */
.glitch {
  position:relative;
}

.glitch::before,
.glitch::after {
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
}

.glitch::before {
  color:#bbb;
  transform:translate(3px,0);
  animation:gl1 0.1s infinite;
}

.glitch::after {
  color:#777;
  transform:translate(-3px,0);
  animation:gl2 0.13s infinite;
}

@keyframes gl1 {
  0%{transform:translate(2px,-1px)}
  50%{transform:translate(-4px,2px)}
  100%{transform:translate(3px,-2px)}
}

@keyframes gl2 {
  0%{transform:translate(-2px,1px)}
  50%{transform:translate(4px,-3px)}
  100%{transform:translate(-3px,2px)}
}

/* 🧱 collapsing UI */
.container {
  max-width:700px;
  margin:auto;
  padding:60px 30px;
  transform:rotate(-0.6deg);
}

.card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:18px;
  padding:30px;
  backdrop-filter:blur(6px);
  animation:cardRattle 0.12s infinite;
}

@keyframes cardRattle {
  0%{transform:translate(0,0)}
  25%{transform:translate(3px,-2px)}
  50%{transform:translate(-3px,2px)}
  75%{transform:translate(2px,3px)}
}

/* ⚠️ shock flicker */
.flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:0.05;
  animation:flash 0.1s infinite;
  pointer-events:none;
}

@keyframes flash {
  0%,100%{opacity:0.02}
  50%{opacity:0.12}
}

a { color:rgba(255,255,255,0.6); text-decoration:none }
a:hover { color:white }

.tag {
  margin-top:10px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,255,255,0.15);
  display:inline-block;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="flash"></div>

<div class="container">
<a href="index.html">← Back</a>

<div class="card">

<h1 class="glitch" data-text="Cataclysmic">Cataclysmic</h1>
<div class="tag">Tier: 5 (Borderline)</div>

<p>Structural collapse of reality. The world breaks apart under instability.</p>

<ul><li>Parkour 23</li></ul>

</div>
</div>

</body>
</html>
