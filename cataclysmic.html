<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cataclysmic</title>

<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Overpass',sans-serif;
  color:white;
  background:#000;
  overflow:hidden;
}

/* 🏚 broken grayscale world */
.bg {
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08), transparent 60%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.05) 0px, transparent 4px);
  filter: grayscale(1) contrast(200%) brightness(0.6);
  animation:
    collapse 0.6s infinite alternate,
    tremor 0.2s infinite;
  z-index:-3;
}

@keyframes collapse {
  0%{transform:scale(1) translate(0,0)}
  50%{transform:scale(1.05) translate(-10px,5px)}
  100%{transform:scale(0.98) translate(10px,-5px)}
}

@keyframes tremor {
  0%{transform:translate(0,0)}
  25%{transform:translate(2px,-1px)}
  50%{transform:translate(-2px,1px)}
  75%{transform:translate(1px,2px)}
}

/* ☠ heavy glitch desaturation */
.glitch {
  position:relative;
}

.glitch::before,
.glitch::after {
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  opacity:0.6;
}

.glitch::before {
  color:#bbb;
  transform:translate(2px,0);
}

.glitch::after {
  color:#777;
  transform:translate(-2px,0);
}

/* 🪨 collapsing UI */
.container {
  max-width:700px;
  margin:auto;
  padding:60px 30px;
  transform:rotate(-0.4deg);
  filter:grayscale(1);
}

.card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:30px;
  backdrop-filter:blur(6px);
  animation:break 0.3s infinite;
}

@keyframes break {
  0%{transform:translate(0,0)}
  50%{transform:translate(3px,-2px)}
  100%{transform:translate(-3px,2px)}
}

a { color:rgba(255,255,255,0.5); text-decoration:none }
a:hover { color:white }

.tag {
  margin-top:10px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,255,255,0.1);
  display:inline-block;
}

/* dim flicker */
.flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:0.03;
  animation:flicker 0.4s infinite;
  pointer-events:none;
}

@keyframes flicker {
  0%,100%{opacity:0.02}
  50%{opacity:0.06}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="flash"></div>

<div class="container">
<a href="index.html">← Back</a>

<div class="card">

<h1 class="glitch" data-text="Cataclysmic">Cataclysmic</h1>
<div class="tag">Tier: 5 (Borderline)</div>

<p>Structural collapse. The world loses color, clarity, and coherence.</p>

<ul><li>Parkour 23</li></ul>

</div>
</div>

</body>
</html>
