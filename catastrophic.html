<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catastrophic</title>

<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Overpass',sans-serif;
  color:white;
  background:#000;
  overflow:hidden;
}

/* 🧩 REALITY FRACTURE FIELD (new identity) */
.bg {
  position:fixed;
  inset:0;
  background:
    repeating-linear-gradient(90deg,
      rgba(255,255,255,0.05) 0px,
      transparent 1px,
      transparent 6px
    ),
    repeating-linear-gradient(0deg,
      rgba(255,0,100,0.06) 0px,
      transparent 2px,
      transparent 8px
    ),
    radial-gradient(circle at 50% 50%, rgba(0,255,255,0.08), transparent 60%);
  filter:contrast(220%) brightness(0.7);
  animation:
    fractureMove 0.35s infinite steps(2),
    shear 1.2s infinite alternate;
  z-index:-3;
}

@keyframes fractureMove {
  0% { transform:translate(0,0); }
  25% { transform:translate(6px,-4px); }
  50% { transform:translate(-5px,3px); }
  75% { transform:translate(3px,5px); }
  100% { transform:translate(0,0); }
}

@keyframes shear {
  0% { filter:contrast(220%) brightness(0.7); }
  50% { filter:contrast(300%) brightness(0.5); }
  100% { filter:contrast(220%) brightness(0.7); }
}

/* ⚡ layered glitch (not RGB spam anymore) */
.glitch {
  position:relative;
  animation:microBreak 0.18s infinite;
}

@keyframes microBreak {
  0% { transform:translate(0,0); }
  50% { transform:translate(2px,-1px); }
  100% { transform:translate(0,0); }
}

.glitch::before {
  content:attr(data-text);
  position:absolute;
  left:2px;
  top:0;
  color:rgba(255,0,120,0.7);
  clip-path: inset(0 0 50% 0);
}

.glitch::after {
  content:attr(data-text);
  position:absolute;
  left:-2px;
  top:0;
  color:rgba(0,255,255,0.6);
  clip-path: inset(50% 0 0 0);
}

/* 🧱 unstable structure */
.container {
  max-width:700px;
  margin:auto;
  padding:60px 30px;
}

.card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;
  padding:30px;
  backdrop-filter:blur(8px);
  animation:structureFail 0.14s infinite;
}

@keyframes structureFail {
  0% { transform:translate(0,0); }
  25% { transform:translate(3px,-2px) skewX(1deg); }
  50% { transform:translate(-3px,2px) skewX(-1deg); }
  75% { transform:translate(2px,3px); }
}

a { color:rgba(255,255,255,0.7); text-decoration:none }
a:hover { color:white }

.tag {
  margin-top:10px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,255,255,0.18);
  display:inline-block;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
<a href="index.html">← Back</a>

<div class="card">

<h1 class="glitch" data-text="Catastrophic">Catastrophic</h1>
<div class="tag">Tier: 5 (Borderline)</div>

<p>Reality fractures into layered instability. Structure no longer aligns consistently.</p>

<ul><li>Parkour 22</li></ul>

</div>
</div>

</body>
</html>
