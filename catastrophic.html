<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catastrophic</title>

<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Overpass',sans-serif;
  color:white;
  background:#000;
  overflow:hidden;
}

/* 🌈 OVER-SATURATED REALITY OVERLOAD */
.bg {
  position:fixed;
  inset:0;
  background:
    conic-gradient(from 0deg, #ff004c, #00e5ff, #b300ff, #00ff6a, #ffea00, #ff004c),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15), transparent 60%);
  filter:blur(20px) contrast(180%) saturate(250%);
  animation:
    spin 2.5s infinite linear,
    jitter 0.12s infinite;
  z-index:-3;
}

@keyframes spin {
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

@keyframes jitter {
  0%{transform:translate(0,0)}
  25%{transform:translate(3px,-2px)}
  50%{transform:translate(-3px,2px)}
  75%{transform:translate(2px,3px)}
}

/* ⚡ aggressive glitch text */
.glitch {
  position:relative;
  animation:shake 0.08s infinite;
}

@keyframes shake {
  0%{transform:translate(0,0)}
  50%{transform:translate(2px,-2px)}
  100%{transform:translate(0,0)}
}

.glitch::before,
.glitch::after {
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
}

.glitch::before {
  color:#ff00ff;
  transform:translate(3px,-2px);
}

.glitch::after {
  color:#00ffff;
  transform:translate(-3px,2px);
}

/* 🌪 unstable UI */
.container {
  max-width:700px;
  margin:auto;
  padding:60px 30px;
  transform:rotate(0.6deg);
}

.card {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:18px;
  padding:30px;
  backdrop-filter:blur(8px);
  animation:cardWobble 0.12s infinite;
}

@keyframes cardWobble {
  0%{transform:translate(0,0)}
  25%{transform:translate(2px,-3px)}
  50%{transform:translate(-3px,2px)}
  75%{transform:translate(3px,3px)}
}

a { color:rgba(255,255,255,0.7); text-decoration:none }
a:hover { color:white }

.tag {
  margin-top:10px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,255,255,0.25);
  display:inline-block;
}

/* flashing instability */
.flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:0.06;
  animation:flash 0.15s infinite;
  pointer-events:none;
}

@keyframes flash {
  0%,100%{opacity:0.02}
  50%{opacity:0.12}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="flash"></div>

<div class="container">
<a href="index.html">← Back</a>

<div class="card">

<h1 class="glitch" data-text="Catastrophic">Catastrophic</h1>
<div class="tag">Tier: 5 (Borderline)</div>

<p>Overload event. Visual reality becomes unstable and over-saturated.</p>

<ul><li>Parkour 22</li></ul>

</div>
</div>

</body>
</html>
