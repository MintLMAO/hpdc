<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catastrophic</title>

<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Overpass',sans-serif;
  color:white;
  background:#000;
  overflow:hidden;
}

/* 🌈 controlled chaos (NOT illegible) */
.bg {
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 40%, rgba(255,0,80,0.45), transparent 55%),
    radial-gradient(circle at 70% 60%, rgba(0,200,255,0.35), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(255,255,0,0.2), transparent 70%);
  filter:blur(18px) contrast(160%) saturate(200%);
  animation:
    drift 1.2s infinite alternate,
    hue 3s infinite linear;
  z-index:-3;
}

@keyframes drift {
  0% { transform:translate(0,0) scale(1); }
  50% { transform:translate(-10px,5px) scale(1.03); }
  100% { transform:translate(10px,-5px) scale(0.98); }
}

@keyframes hue {
  0% { filter:blur(18px) hue-rotate(0deg) contrast(160%) saturate(200%); }
  100% { filter:blur(18px) hue-rotate(360deg) contrast(160%) saturate(200%); }
}

/* ⚡ readable glitch */
.glitch {
  position:relative;
  animation:shake 0.12s infinite;
}

@keyframes shake {
  0% { transform:translate(0,0); }
  50% { transform:translate(2px,-2px); }
  100% { transform:translate(0,0); }
}

.glitch::before,
.glitch::after {
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  opacity:0.8;
}

.glitch::before {
  color:#ff2e88;
  transform:translate(2px,-1px);
}

.glitch::after {
  color:#00d4ff;
  transform:translate(-2px,1px);
}

/* 🧨 unstable but readable UI */
.container {
  max-width:700px;
  margin:auto;
  padding:60px 30px;
}

.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:18px;
  padding:30px;
  backdrop-filter:blur(10px);
  animation:cardShake 0.15s infinite;
}

@keyframes cardShake {
  0%{transform:translate(0,0)}
  25%{transform:translate(2px,-1px)}
  50%{transform:translate(-2px,2px)}
  75%{transform:translate(1px,1px)}
}

a { color:rgba(255,255,255,0.7); text-decoration:none }
a:hover { color:white }

.tag {
  margin-top:10px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,255,255,0.2);
  display:inline-block;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
<a href="index.html">← Back</a>

<div class="card">

<h1 class="glitch" data-text="Catastrophic">Catastrophic</h1>
<div class="tag">Tier: 5 (Borderline)</div>

<p>Critical overload. Reality is unstable but still partially coherent.</p>

<ul><li>Parkour 22</li></ul>

</div>
</div>

</body>
</html>
