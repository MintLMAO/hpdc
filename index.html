<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Difficulty Chart</title>

<style>
body {
  margin: 0;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: Arial, sans-serif;
}

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

/* BASE TIER */
.tier {
  height: 70px;
  position: relative;
  cursor: pointer;
  transition: transform 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tier:hover {
  transform: scale(1.03);
  z-index: 5;
}

/* TOOLTIP */
.tooltip {
  position: absolute;
  right: 110%;
  top: 50%;
  transform: translate(10px, -50%);
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  opacity: 0;
  transition: 0.2s ease;
  white-space: nowrap;
}

.tier:hover .tooltip {
  opacity: 1;
  transform: translate(0, -50%);
}

/* EFFECTS */
@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px,-2px); }
  50% { transform: translate(-2px,2px); }
  75% { transform: translate(2px,2px); }
  100% { transform: translate(0,0); }
}
.shake { animation: shake 0.12s infinite; }

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
.pulse { animation: pulse 1.6s infinite; }

@keyframes flash {
  0% { filter: brightness(1); }
  50% { filter: brightness(2); }
  100% { filter: brightness(1); }
}
.flash { animation: flash 0.5s ease; }

@keyframes trail {
  0% { box-shadow: 0 0 10px red; }
  25% { box-shadow: 0 0 10px lime; }
  50% { box-shadow: 0 0 10px cyan; }
  75% { box-shadow: 0 0 10px magenta; }
  100% { box-shadow: 0 0 10px yellow; }
}
.trail { animation: trail 0.2s infinite; }

</style>
</head>

<body>

<div class="chart">

<!-- 1 -->
<div class="tier" style="background:#208217;" onclick="go('effortless.html')">
  <div class="tooltip">Effortless</div>
</div>

<div class="tier" style="background:#649f1d;" onclick="go('cakewalk.html')">
  <div class="tooltip">Cakewalk</div>
</div>

  <div class="tooltip">Simple</div>
</div>

  <div class="tooltip">Easy</div>
</div>

<div class="tier" style="background:#d9d81c;" onclick="go('moderate.html')">

</div>

</div>

<div class="tier" style="background:#d99a1d;" onclick="go('advanced.html')">
  <div class="tooltip">Advanced</div>
</div>

<div class="tier" style="background:#d9861c;" onclick="go('challenging.html')">
  <div class="tooltip">Challenging</div>
</div>

<div class="tier" style="background:#d8691d;" onclick="go('difficult.html')">
  <div class="tooltip">Difficult</div>
</div>

  <div class="tooltip">Hard</div>
</div>

  <div class="tooltip">Intense</div>
</div>

<div class="tier" style="background:#3d0301;" onclick="go('severe.html')">
  <div class="tooltip">Severe</div>
</div>

<div class="tier pulse" style="background:#fe01d3;" onclick="go('remorseless.html')">
  <div class="tooltip">Remorseless</div>
</div>

<div class="tier" style="background:#8b0097;" onclick="go('vigorous.html')">
  <div class="tooltip">Vigorous</div>
</div>

<div class="tier" style="background:#3e0052;" onclick="go('savage.html')">

</div>

<div class="tier shake" style="background:#2734ff;" onclick="go('insane.html')">
  <div class="tooltip">Insane</div>
</div>

<div class="tier shake" style="background:#2888ff;" onclick="go('extreme.html')">

</div>
