<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Difficulty Chart</title>

  <style>
    body {
      margin: 0;
      background: #0f0f14;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .chart {
      width: 220px;
      display: flex;
      flex-direction: column;
    }

    .tier {
      height: 70px;
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease;
    }

    .tier:hover {
      transform: scale(1.03);
      z-index: 2;
    }

    .tooltip {
      position: absolute;
      right: 110%;
      top: 50%;
      transform: translate(10px, -50%); /* start slightly to the right */
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .tier:hover .tooltip {
      opacity: 1;
      transform: translate(0px, -50%); /* slide into final position */
    }
  </style>
</head>

<body>

<div class="chart">

  <div class="tier" style="background:#7ec8ff;" onclick="go('medium.html')">
    <div class="tooltip">Medium</div>
  </div>

  <div class="tier" style="background:#5aa9ff;" onclick="go('demanding.html')">
    <div class="tooltip">Demanding</div>
  </div>

  <div class="tier" style="background:#3d7dff;" onclick="go('hard.html')">
    <div class="tooltip">Hard</div>
  </div>

  <div class="tier" style="background:#7a3dff;" onclick="go('intense.html')">
    <div class="tooltip">Intense</div>
  </div>

  <div class="tier" style="background:#c300a6;" onclick="go('remorseless.html')">
    <div class="tooltip">Remorseless</div>
  </div>

  <div class="tier" style="background:#8b0070;" onclick="go('unforgiving.html')">
    <div class="tooltip">Unforgiving</div>
  </div>

  <div class="tier" style="background:#5a0048;" onclick="go('relentless.html')">
    <div class="tooltip">Relentless</div>
  </div>

</div>

<script>
function go(page) {
  window.location.href = page;
}
</script>

</body>
</html>
