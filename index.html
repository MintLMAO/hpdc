<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Difficulty Chart</title>

<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: 'Overpass', sans-serif;
  overflow: hidden;
  transition: filter 0.6s ease, transform 0.2s ease, background 1s ease;
}

/* GLOBAL OVERLAYS */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease;
  background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.75));
}

body.terrifying::before {
  opacity: 1;
}

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

.tier {
  height: 70px;
  position: relative;
  cursor: pointer;
  overflow: visible;
  transition: transform 0.15s ease;
}

.tier:hover {
  transform: scale(1.03);
  z-index: 5;
}

/* TOOLTIP */
.tooltip {
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translate(0,-50%);
  opacity: 0;
  color: white;
  padding: 6px 10px;
  white-space: nowrap;
  pointer-events: none;
  transition: transform 0.25s ease, opacity 0.2s ease;
  background: transparent;
  text-shadow: 0 0 6px rgba(0,0,0,0.85);
  font-weight: 600;
}

.tier:hover .tooltip {
  opacity: 1;
  transform: translate(-120%, -50%);
}

/* =========================
   TERRIFYING (global horror mode)
========================= */
body.terrifying {
  filter: grayscale(1) contrast(1.5) brightness(0.65);
  animation: horrorFlicker 0.12s infinite;
}

@keyframes horrorFlicker {
  0% { filter: grayscale(1) contrast(1.5) brightness(0.65); }
  50% { filter: grayscale(1) contrast(1.8) brightness(0.55); }
  100% { filter: grayscale(1) contrast(1.5) brightness(0.65); }
}

/* =========================
   CATASTROPHIC (full shake)
========================= */
body.catastrophic {
  animation: globalShake 0.10s infinite;
}

@keyframes globalShake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-2px,1px); }
  50% { transform: translate(2px,-2px); }
  75% { transform: translate(-1px,2px); }
  100% { transform: translate(0,0); }
}

/* =========================
   CATACLYSMIC (warp instability)
========================= */
body.cataclysmic {
  animation: globalWarp 0.25s infinite;
}

@keyframes globalWarp {
  0% { transform: skew(0deg,0deg) scale(1); }
  50% { transform: skew(2deg,-2deg) scale(1.01); }
  100% { transform: skew(0deg,0deg) scale(1); }
}

/* =========================
   TIER EFFECTS (your original system preserved)
========================= */

.intense { animation: microShake 0.22s infinite; }
.severe { animation: microShake 0.18s infinite, softPulse 0.8s infinite; }
.remorseless { animation: driftScale 1.6s infinite linear; }
.vigorous { animation: driftScale 1.3s infinite linear, rotateWobble 1s infinite; }
.savage { animation: warp 0.7s infinite alternate; }
.insane { animation: warp 0.45s infinite alternate, glitchBurst 0.14s infinite; }
.extreme { animation: phaseShift 0.6s infinite, glitchBurst 0.1s infinite, microShake 0.12s infinite; }
.absurd { animation: dimensionalStretch 0.35s infinite, warp 0.4s infinite, glitchBurst 0.08s infinite; }

/* TERRIFYING TEXT */
.terrifying {
  animation: terrorStutter 0.9s infinite steps(1);
}

/* CATASTROPHIC TEXT */
.catastrophic {
  font-weight: 900;
  text-shadow: 0 0 10px rgba(255,255,255,0.85);
}

/* ETERNAL (cosmic global evolution) */
body.eternal {
  background: radial-gradient(circle at 50% 50%, #0a0a1a, #000);
  filter: saturate(1.4) hue-rotate(20deg);
  animation: cosmicDrift 10s infinite linear;
}

/* =========================
   KEYFRAMES
========================= */

@keyframes microShake {
  0% { transform: translate(0,0); }
  50% { transform: translate(1px,-1px); }
  100% { transform: translate(0,0); }
}

@keyframes softPulse {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(1.4); }
}

@keyframes driftScale {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(2px,-2px) scale(1.06); }
  100% { transform: translate(0,0) scale(1); }
}

@keyframes rotateWobble {
  0%,100% { transform: rotate(0deg); }
  50% { transform: rotate(10deg); }
}

@keyframes warp {
  0% { transform: skewX(0deg) scale(1); }
  100% { transform: skewX(12deg) scale(1.08); }
}

@keyframes glitchBurst {
  0% { text-shadow: 2px 0 red, -2px 0 cyan; }
  50% { text-shadow: -3px 0 red, 3px 0 cyan; }
  100% { text-shadow: 2px 0 red, -2px 0 cyan; }
}

@keyframes phaseShift {
  0% { filter: hue-rotate(0deg); }
  50% { filter: hue-rotate(120deg); }
  100% { filter: hue-rotate(0deg); }
}

@keyframes dimensionalStretch {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.25,0.7); }
}

@keyframes terrorStutter {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px,-2px); }
  50% { transform: translate(-2px,2px); }
  100% { transform: translate(0,0); }
}

@keyframes cosmicDrift {
  0% { transform: translate(0,0); }
  50% { transform: translate(3px,-3px); }
  100% { transform: translate(0,0); }
}

/* =========================
   LAYOUT
========================= */

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

/* TRAIL EFFECT (catastrophic optional enhancement) */
.trail {
  position: fixed;
  pointer-events: none;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="chart">

<div class="tier" style="background:#208217;"><div class="tooltip">Effortless</div></div>
<div class="tier" style="background:#649f1d;"><div class="tooltip">Cakewalk</div></div>
<div class="tier" style="background:#91b91b;"><div class="tooltip">Simple</div></div>
<div class="tier" style="background:#b3cd22;"><div class="tooltip">Easy</div></div>
<div class="tier" style="background:#d9d81c;"><div class="tooltip">Moderate</div></div>
<div class="tier" style="background:#d9ba1c;"><div class="tooltip">Medium</div></div>
<div class="tier" style="background:#d99a1d;"><div class="tooltip">Advanced</div></div>
<div class="tier" style="background:#d9861c;"><div class="tooltip">Challenging</div></div>
<div class="tier" style="background:#d8691d;"><div class="tooltip">Difficult</div></div>
<div class="tier" style="background:#f13d01;"><div class="tooltip">Hard</div></div>

<div class="tier"><div class="tooltip"><span class="intense">Intense</span></div></div>
<div class="tier"><div class="tooltip"><span class="severe">Severe</span></div></div>
<div class="tier"><div class="tooltip"><span class="remorseless">Remorseless</span></div></div>
<div class="tier"><div class="tooltip"><span class="vigorous">Vigorous</span></div></div>
<div class="tier"><div class="tooltip"><span class="savage">Savage</span></div></div>
<div class="tier"><div class="tooltip"><span class="insane">Insane</span></div></div>
<div class="tier"><div class="tooltip"><span class="extreme">Extreme</span></div></div>
<div class="tier"><div class="tooltip"><span class="absurd">Absurd</span></div></div>
<div class="tier" id="terrifying"><div class="tooltip"><span class="terrifying">Terrifying</span></div></div>

<div class="tier" id="catastrophic"><div class="tooltip"><span class="catastrophic">Catastrophic</span></div></div>
<div class="tier" id="cataclysmic"><div class="tooltip">Cataclysmic</div></div>
<div class="tier" id="eternal"><div class="tooltip">Eternal</div></div>

</div>

<script>
const body = document.body;

/* ETERNAL */
document.getElementById("eternal").addEventListener("mouseenter", () => {
  body.classList.add("eternal");
});
document.getElementById("eternal").addEventListener("mouseleave", () => {
  body.classList.remove("eternal");
});

/* TERRIFYING */
document.getElementById("terrifying").addEventListener("mouseenter", () => {
  body.classList.add("terrifying");
});
document.getElementById("terrifying").addEventListener("mouseleave", () => {
  body.classList.remove("terrifying");
});

/* CATASTROPHIC */
document.getElementById("catastrophic").addEventListener("mouseenter", () => {
  body.classList.add("catastrophic");
});
document.getElementById("catastrophic").addEventListener("mouseleave", () => {
  body.classList.remove("catastrophic");
});

/* CATACLYSMIC */
document.getElementById("cataclysmic").addEventListener("mouseenter", () => {
  body.classList.add("cataclysmic");
});
document.getElementById("cataclysmic").addEventListener("mouseleave", () => {
  body.classList.remove("cataclysmic");
});
</script>

</body>
</html>
