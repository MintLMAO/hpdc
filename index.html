<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Difficulty Chart</title>

<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: 'Overpass', sans-serif;
  transition: filter 2s ease, background 2s ease;
}

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

.tier {
  height: 70px;
  position: relative;
  cursor: pointer;
  overflow: visible;
  transition: transform 0.15s ease, filter 0.3s ease;
}

.tier:hover {
  transform: scale(1.03);
  z-index: 5;
}

/* TOOLTIP */
.tooltip {
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translate(0,-50%);
  opacity: 0;
  color: white;
  padding: 6px 10px;
  white-space: nowrap;
  pointer-events: none;
  transition: transform 0.25s ease, opacity 0.2s ease;
  background: transparent;
  text-shadow: 0 0 6px rgba(0,0,0,0.85);
  font-weight: 600;
}

.tier:hover .tooltip {
  opacity: 1;
  transform: translate(-120%, -50%);
}

/* =========================
   BASE ESCALATION
========================= */

.intense { animation: microShake 0.22s infinite; }
.severe { animation: microShake 0.18s infinite, softPulse 0.8s infinite; }
.remorseless { animation: driftScale 1.6s infinite linear; }
.vigorous { animation: driftScale 1.3s infinite linear, rotateWobble 1s infinite; }
.savage { animation: warp 0.7s infinite alternate; }
.insane { animation: warp 0.45s infinite alternate, glitchBurst 0.14s infinite; }
.extreme { animation: phaseShift 0.6s infinite, microShake 0.12s infinite; }

/* =========================
   ABSURD = LIMINAL SYSTEM
========================= */

.absurd {
  animation: liminalShift 2.5s infinite ease-in-out;
  letter-spacing: 2px;
  opacity: 0.9;
}

/* =========================
   TERRIFYING = LOCAL FIELD DISTORTION
========================= */

.terrifying {
  animation: terrorStutter 0.9s infinite steps(1);
  position: relative;
  z-index: 10;
}

/* =========================
   CATACLYSMIC = GLOBAL INSTABILITY
========================= */

.cataclysmic {
  animation: structuralCollapse 0.4s infinite, microShake 0.08s infinite;
}

/* =========================
   CATASTROPHIC = SYSTEM CORRUPTION EVENT
========================= */

.catastrophic {
  font-weight: 900;
  animation: realityBreak 0.18s infinite;
  text-shadow: 0 0 10px rgba(255,255,255,0.85);
}

/* =========================
   ETERNAL = COSMIC WORLD OVERRIDE
========================= */

.eternal {
  animation:
    cosmicDrift 8s infinite linear,
    cosmicGlow 3s infinite ease-in-out,
    cosmicHue 12s infinite linear;
  position: relative;
}

/* cosmic takeover effect when hovered */
body.eternal-mode {
  background: radial-gradient(circle at center, #0b0f1c, #000);
  filter: saturate(1.4) brightness(1.2);
}

/* focus glow around eternal word */
.eternal::after {
  content: "";
  position: absolute;
  inset: -40px;
  background: radial-gradient(circle, rgba(120,200,255,0.35), transparent 60%);
  z-index: -1;
  animation: eternalPulse 3s infinite ease-in-out;
}

/* =========================
   TERRIFYING - AFFECT NEIGHBORS SLIGHTLY
========================= */

.tier.near-terror {
  transform: translateX(1px);
  filter: brightness(1.1) contrast(1.05);
}

/* =========================
   CATACLYSMIC GLOBAL SHAKE
========================= */

body.cataclysmic-mode {
  animation: globalShake 0.2s infinite;
}

/* =========================
   CATASTROPHIC GLOBAL CORRUPTION
========================= */

body.catastrophic-mode {
  animation: globalCorrupt 0.12s infinite;
}

/* =========================
   ABSURD LIMINAL KEYFRAME
========================= */

@keyframes liminalShift {
  0% { transform: translate(0,0) scale(1); filter: hue-rotate(0deg); }
  25% { transform: translate(-2px,1px) scale(1.02); filter: hue-rotate(90deg); }
  50% { transform: translate(2px,-1px) scale(0.98); filter: hue-rotate(180deg); }
  75% { transform: translate(-1px,2px) scale(1.01); filter: hue-rotate(270deg); }
  100% { transform: translate(0,0) scale(1); filter: hue-rotate(360deg); }
}

/* TERRIFYING STUTTER */
@keyframes terrorStutter {
  0% { transform: translate(0,0); }
  20% { transform: translate(2px,-1px); }
  40% { transform: translate(-2px,1px); }
  60% { transform: translate(1px,2px); }
  80% { transform: translate(-1px,-2px); }
  100% { transform: translate(0,0); }
}

/* STRUCTURAL COLLAPSE */
@keyframes structuralCollapse {
  0% { transform: scale(1); }
  50% { transform: scale(0.98) translateX(2px); }
  100% { transform: scale(1); }
}

/* REALITY BREAK */
@keyframes realityBreak {
  0% { transform: translate(0,0); }
  50% { transform: translate(2px,-2px); }
  100% { transform: translate(0,0); }
}

/* COSMIC */
@keyframes cosmicDrift {
  0% { transform: translate(0,0); }
  50% { transform: translate(3px,-3px); }
  100% { transform: translate(0,0); }
}

@keyframes cosmicGlow {
  0%,100% { text-shadow: 0 0 5px #fff, 0 0 10px #6cf; }
  50% { text-shadow: 0 0 30px #6cf, 0 0 60px #f0f; }
}

@keyframes cosmicHue {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

@keyframes eternalPulse {
  0%,100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* GLOBAL EFFECTS */
@keyframes globalShake {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px,1px); }
  50% { transform: translate(-2px,-1px); }
  75% { transform: translate(1px,-2px); }
  100% { transform: translate(0,0); }
}

@keyframes globalCorrupt {
  0% { filter: hue-rotate(0deg) brightness(1); }
  50% { filter: hue-rotate(120deg) brightness(1.2); }
  100% { filter: hue-rotate(0deg) brightness(1); }
}

/* =========================
   JS-DRIVEN NEAR EFFECT
========================= */

.terrifying-active .tier {
  transition: transform 0.2s ease, filter 0.2s ease;
}
</style>
</head>

<body>

<div class="chart">

<!-- NORMAL -->
<div class="tier"><div class="tooltip">Effortless</div></div>
<div class="tier"><div class="tooltip">Cakewalk</div></div>
<div class="tier"><div class="tooltip">Simple</div></div>
<div class="tier"><div class="tooltip">Easy</div></div>
<div class="tier"><div class="tooltip">Moderate</div></div>
<div class="tier"><div class="tooltip">Medium</div></div>
<div class="tier"><div class="tooltip">Advanced</div></div>
<div class="tier"><div class="tooltip">Challenging</div></div>
<div class="tier"><div class="tooltip">Difficult</div></div>
<div class="tier"><div class="tooltip">Hard</div></div>

<!-- ESCALATION -->
<div class="tier"><div class="tooltip"><span class="intense">Intense</span></div></div>
<div class="tier"><div class="tooltip"><span class="severe">Severe</span></div></div>
<div class="tier"><div class="tooltip"><span class="remorseless">Remorseless</span></div></div>
<div class="tier"><div class="tooltip"><span class="vigorous">Vigorous</span></div></div>
<div class="tier"><div class="tooltip"><span class="savage">Savage</span></div></div>
<div class="tier"><div class="tooltip"><span class="insane">Insane</span></div></div>
<div class="tier"><div class="tooltip"><span class="extreme">Extreme</span></div></div>
<div class="tier"><div class="tooltip"><span class="absurd">Absurd</span></div></div>
<div class="tier" id="terrifyingTier"><div class="tooltip"><span class="terrifying">Terrifying</span></div></div>

<!-- HIGH -->
<div class="tier"><div class="tooltip"><span class="cataclysmic">Cataclysmic</span></div></div>
<div class="tier" id="catastrophicTier"><div class="tooltip"><span class="catastrophic">Catastrophic</span></div></div>

<div class="tier" id="eternalTier"><div class="tooltip"><span class="eternal">Eternal</span></div></div>

</div>

<script>
const terrifyingTier = document.getElementById("terrifyingTier");
const catastrophicTier = document.getElementById("catastrophicTier");
const eternalTier = document.getElementById("eternalTier");
const body = document.body;

/* TERRIFYING: affects nearby tiers slightly */
terrifyingTier.addEventListener("mouseenter", () => {
  document.querySelectorAll(".tier").forEach(t => {
    if (Math.random() > 0.7) t.classList.add("near-terror");
  });
  body.classList.add("terrifying-active");
});

terrifyingTier.addEventListener("mouseleave", () => {
  document.querySelectorAll(".tier").forEach(t => {
    t.classList.remove("near-terror");
  });
  body.classList.remove("terrifying-active");
});

/* CATACLYSMIC: global shake */
catastrophicTier.addEventListener("mouseenter", () => {
  body.classList.add("cataclysmic-mode");
});
catastrophicTier.addEventListener("mouseleave", () => {
  body.classList.remove("cataclysmic-mode");
});

/* CATASTROPHIC: deeper corruption */
eternalTier.previousElementSibling.addEventListener("mouseenter", () => {
  body.classList.add("catastrophic-mode");
});
eternalTier.previousElementSibling.addEventListener("mouseleave", () => {
  body.classList.remove("catastrophic-mode");
});

/* ETERNAL: full cosmic takeover */
eternalTier.addEventListener("mouseenter", () => {
  body.classList.add("eternal-mode");
});
eternalTier.addEventListener("mouseleave", () => {
  body.classList.remove("eternal-mode");
});
</script>

</body>
</html>
