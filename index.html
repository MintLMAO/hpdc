<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Difficulty Chart</title>

<style>
body {
  margin: 0;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: Arial, sans-serif;
}

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

/* =========================
   BASE TIER (NO EFFECTS)
========================= */
.tier {
  height: 70px;
  position: relative;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
}

.tier:hover {
  transform: scale(1.03);
  z-index: 10;
}

/* =========================
   TOOLTIP BASE (SLIDE OUT)
========================= */
.tooltip {
  position: absolute;
  right: 0%;
  top: 50%;

  transform: translate(0px, -50%) scale(0.95);
  opacity: 0;

  background: rgba(0,0,0,0.85);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;

  pointer-events: none;

  transition: transform 0.28s cubic-bezier(0.2, 0.9, 0.2, 1),
              opacity 0.25s ease;
}

.tier:hover .tooltip {
  opacity: 1;
  transform: translate(-120%, -50%) scale(1);
}

/* =========================
   TEXT ANIMATIONS (INSIDE TOOLTIP)
========================= */

/* Intense - flash */
.intense { animation: flash 0.4s ease; }

@keyframes flash {
  0% { filter: brightness(1); }
  50% { filter: brightness(2.5); }
  100% { filter: brightness(1); }
}

/* Severe - pulse on appear */
.severe { animation: pulse 1.2s ease; }

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* Remorseless - constant pulse */
.remorseless { animation: pulseLoop 1.6s infinite; }

@keyframes pulseLoop {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* Catastrophic - glitchy shake */
.catastrophic { animation: shake 0.12s infinite; }

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px,-2px); }
  50% { transform: translate(-2px,2px); }
  75% { transform: translate(2px,2px); }
  100% { transform: translate(0,0); }
}

</style>
</head>

<body>

<div class="chart">

<!-- 1 -->
<div class="tier" style="background:#208217;" onclick="go('effortless.html')">
  <div class="tooltip">Effortless</div>
</div>

  <div class="tooltip">Cakewalk</div>
</div>

</div>

</div>

</div>

<div class="tier" style="background:#d9861c;" onclick="go('challenging.html')">
  <div class="tooltip">Challenging</div>
</div>

<div class="tier" style="background:#d8691d;" onclick="go('difficult.html')">

</div>

<div class="tier" style="background:#3d0301;" onclick="go('severe.html')">

<div class="tier" style="background:#fe01d3;" onclick="go('remorseless.html')">

<div class="tier" style="background:#8b0097;" onclick="go('vigorous.html')">

</div>

<div class="tier" style="background:#3e0052;" onclick="go('savage.html')">
