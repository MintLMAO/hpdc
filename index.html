<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Difficulty Chart</title>

<style>
body {
  margin: 0;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: Arial, sans-serif;
}

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

/* BASE TIER */
.tier {
  height: 70px;
  position: relative;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
}

.tier:hover {
  transform: scale(1.03);
  z-index: 5;
}

/* TOOLTIP (FLY-IN FROM BEHIND) */
.tooltip {
  position: absolute;
  right: 110%;
  top: 50%;

  background: rgba(0,0,0,0.85);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;

  opacity: 0;
  transform: translate(25px, -50%) scale(0.9);
  filter: blur(2px);

  pointer-events: none;

  transition: 
    transform 0.25s ease,
    opacity 0.25s ease,
    filter 0.25s ease;
}

.tier:hover .tooltip {
  opacity: 1;
  transform: translate(0px, -50%) scale(1);
  filter: blur(0px);
}

</style>
</head>

<body>

<div class="chart">

<!-- 1 -->
<div class="tier" style="background:#208217;" onclick="go('effortless.html')">
  <div class="tooltip">Effortless</div>
</div>
