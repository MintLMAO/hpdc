<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Difficulty Chart</title>

<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: 'Overpass', sans-serif;
}

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

.tier {
  height: 70px;
  position: relative;
  cursor: pointer;
  overflow: visible;
  transition: transform 0.15s ease;
}

.tier:hover {
  transform: scale(1.03);
  z-index: 5;
}

/* TOOLTIP */
.tooltip {
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translate(0px, -50%);
  opacity: 0;
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  transition: transform 0.25s cubic-bezier(0.2,0.9,0.2,1),
              opacity 0.2s ease;
}

.tier:hover .tooltip {
  opacity: 1;
  transform: translate(-120%, -50%);
}

.label {
  display: inline-block;
}

/* =========================
   EFFECTS
========================= */

.intense {
  animation: intense 0.15s infinite;
}
@keyframes intense {
  0%,100% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.05); filter: brightness(2); }
}

.severe {
  animation: severe 0.5s infinite;
}
@keyframes severe {
  0%,90%,100% { transform: scale(1); }
  50% { transform: scale(1.25); }
}

.remorseless {
  animation: remorseless 2.5s infinite linear;
}
@keyframes remorseless {
  0% { transform: scale(1); }
  100% { transform: scale(1.15); }
}

.vigorous {
  animation: vigorous 0.12s infinite;
}
@keyframes vigorous {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px,-1px); }
  50% { transform: translate(-2px,1px); }
  75% { transform: translate(1px,2px); }
  100% { transform: translate(-1px,-2px); }
}

.savage {
  animation: savage 0.3s infinite alternate;
}
@keyframes savage {
  0% { transform: skewX(0deg); }
  100% { transform: skewX(18deg); }
}

.insane {
  animation: insane 0.15s infinite;
}
@keyframes insane {
  0% { text-shadow: 3px 0 red, -3px 0 cyan; }
  50% { text-shadow: -3px 0 red, 3px 0 cyan; }
  100% { text-shadow: 3px 0 red, -3px 0 cyan; }
}

.extreme {
  animation: extreme 0.6s infinite;
}
@keyframes extreme {
  0%,100% { transform: rotate(0deg); }
  50% { transform: rotate(12deg); }
}

.absurd {
  animation: absurd 0.4s infinite;
}
@keyframes absurd {
  0% { transform: scale(1,1); }
  50% { transform: scale(1.3,0.6) skew(10deg); }
  100% { transform: scale(1,1); }
}

.terrifying {
  animation: terrifying 0.18s infinite;
}
@keyframes terrifying {
  0% { opacity:1; transform: translate(0,0); }
  20% { opacity:0.2; transform: translate(-2px,1px); }
  40% { opacity:1; transform: translate(2px,-2px); }
  60% { opacity:0.1; transform: translate(-1px,2px); }
  80% { opacity:1; transform: translate(1px,-1px); }
  100% { opacity:1; transform: translate(0,0); }
}

.catastrophic {
  position: relative;
  z-index: 1000;
  font-weight: bold;
}

.cataclysmic {
  animation: cataclysmic 1.5s infinite;
}
@keyframes cataclysmic {
  0%,100% { transform: scale(1); }
  50% { transform: scale(0.7); }
}

.eternal {
  animation: eternal 2s infinite;
}
@keyframes eternal {
  0%,100% { text-shadow: 0 0 5px gold; }
  50% { text-shadow: 0 0 20px gold; }
}

/* TRAIL */
.trail {
  position: fixed;
  pointer-events: none;
  opacity: 0.85;
  z-index: 999;
}

</style>
</head>

<body>

<div class="chart">

<!-- NORMAL TIERS -->
<div class="tier" style="background:#208217;"><div class="tooltip"><span class="label">Effortless</span></div></div>
<div class="tier" style="background:#649f1d;"><div class="tooltip"><span class="label">Cakewalk</span></div></div>
<div class="tier" style="background:#91b91b;"><div class="tooltip"><span class="label">Simple</span></div></div>
<div class="tier" style="background:#b3cd22;"><div class="tooltip"><span class="label">Easy</span></div></div>
<div class="tier" style="background:#d9d81c;"><div class="tooltip"><span class="label">Moderate</span></div></div>
<div class="tier" style="background:#d9ba1c;"><div class="tooltip"><span class="label">Medium</span></div></div>
<div class="tier" style="background:#d99a1d;"><div class="tooltip"><span class="label">Advanced</span></div></div>
<div class="tier" style="background:#d9861c;"><div class="tooltip"><span class="label">Challenging</span></div></div>
<div class="tier" style="background:#d8691d;"><div class="tooltip"><span class="label">Difficult</span></div></div>
<div class="tier" style="background:#f13d01;"><div class="tooltip"><span class="label">Hard</span></div></div>

<!-- EFFECT TIERS -->
<div class="tier" style="background:#a30800;"><div class="tooltip"><span class="label intense">Intense</span></div></div>
<div class="tier" style="background:#3d0301;"><div class="tooltip"><span class="label severe">Severe</span></div></div>
<div class="tier" style="background:#fe01d3;"><div class="tooltip"><span class="label remorseless">Remorseless</span></div></div>
<div class="tier" style="background:#8b0097;"><div class="tooltip"><span class="label vigorous">Vigorous</span></div></div>
<div class="tier" style="background:#3e0052;"><div class="tooltip"><span class="label savage">Savage</span></div></div>
<div class="tier" style="background:#2734ff;"><div class="tooltip"><span class="label insane">Insane</span></div></div>
<div class="tier" style="background:#2888ff;"><div class="tooltip"><span class="label extreme">Extreme</span></div></div>
<div class="tier" style="background:#00ff99;"><div class="tooltip"><span class="label absurd">Absurd</span></div></div>
<div class="tier" style="background:#28fdff;"><div class="tooltip"><span class="label terrifying">Terrifying</span></div></div>

<!-- CATASTROPHIC -->
<div class="tier" style="background:#ffffff;" id="catTier">
  <div class="tooltip">
    <span class="label catastrophic" id="catLabel">Catastrophic</span>
  </div>
</div>

<div class="tier" style="background:#464646;"><div class="tooltip"><span class="label cataclysmic">Cataclysmic</span></div></div>
<div class="tier" style="background:#000000;"><div class="tooltip"><span class="label eternal">Eternal</span></div></div>

</div>

<script>
const cat = document.getElementById("catLabel");
const catTier = document.getElementById("catTier");

let catX = 0, catY = 0, t = 0, hovering = false;

function shake() {
  t += 0.22;
  catX = Math.sin(t*2)*4;
  catY = Math.cos(t*1.8)*4;
  cat.style.transform = `translate(${catX}px, ${catY}px)`;
}
setInterval(shake, 16);

function trail() {
  if (!hovering) return;

  const rect = cat.getBoundingClientRect();
  const ghost = document.createElement("span");
  ghost.className = "trail";
  ghost.innerText = "Catastrophic";

  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";
  ghost.style.transform = `translate(${catX}px, ${catY}px)`;
  ghost.style.color = `hsl(${Math.random()*360},100%,75%)`;

  document.body.appendChild(ghost);
  setTimeout(()=>ghost.remove(), 40);
}
setInterval(trail, 80);

catTier.addEventListener("mouseenter", ()=>hovering=true);
catTier.addEventListener("mouseleave", ()=>hovering=false);
</script>

</body>
</html>
