<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Difficulty Chart</title>

<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: 'Overpass', sans-serif;
  overflow-x: hidden;
}

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

.tier {
  height: 70px;
  position: relative;
  cursor: pointer;
  overflow: visible;
  transition: transform 0.15s ease;
}

.tier:hover {
  transform: scale(1.03);
  z-index: 5;
}

.tooltip {
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translate(0,-50%);
  opacity: 0;
  color: white;
  padding: 6px 10px;
  white-space: nowrap;
  pointer-events: none;
  transition: transform 0.25s ease, opacity 0.2s ease;
  background: transparent;
  text-shadow: 0 0 6px rgba(0,0,0,0.85);
  font-weight: 600;
}

.tier:hover .tooltip {
  opacity: 1;
  transform: translate(-120%, -50%);
}

/* ESCALATION STYLES (kept simple here for clarity) */
.tier span {
  font-weight: 700;
}

/* CATASTROPHIC */
.catastrophic {
  font-weight: 900;
  text-shadow: 0 0 10px rgba(255,255,255,0.85);
  position: relative;
  display: inline-block;
}

/* TRAIL */
.trail {
  position: fixed;
  pointer-events: none;
  opacity: 0.8;
  font-weight: 900;
  font-family: 'Overpass', sans-serif;
  z-index: 999;
  transition: opacity 0.25s linear;
}

</style>
</head>

<body>

<div class="chart">

<div class="tier" style="background:#208217;"><div class="tooltip">Effortless</div></div>
<div class="tier" style="background:#649f1d;"><div class="tooltip">Cakewalk</div></div>
<div class="tier" style="background:#91b91b;"><div class="tooltip">Simple</div></div>
<div class="tier" style="background:#b3cd22;"><div class="tooltip">Easy</div></div>
<div class="tier" style="background:#d9d81c;"><div class="tooltip">Moderate</div></div>
<div class="tier" style="background:#d9ba1c;"><div class="tooltip">Medium</div></div>
<div class="tier" style="background:#d99a1d;"><div class="tooltip">Advanced</div></div>
<div class="tier" style="background:#d9861c;"><div class="tooltip">Challenging</div></div>
<div class="tier" style="background:#d8691d;"><div class="tooltip">Difficult</div></div>
<div class="tier" style="background:#f13d01;"><div class="tooltip">Hard</div></div>

<div class="tier" style="background:#a30800;"><div class="tooltip">Intense</div></div>
<div class="tier" style="background:#3d0301;"><div class="tooltip">Severe</div></div>
<div class="tier" style="background:#fe01d3;"><div class="tooltip">Remorseless</div></div>
<div class="tier" style="background:#8b0097;"><div class="tooltip">Vigorous</div></div>
<div class="tier" style="background:#3e0052;"><div class="tooltip">Savage</div></div>
<div class="tier" style="background:#2734ff;"><div class="tooltip">Insane</div></div>
<div class="tier" style="background:#2888ff;"><div class="tooltip">Extreme</div></div>
<div class="tier" style="background:#00ff99;"><div class="tooltip">Absurd</div></div>
<div class="tier" style="background:#28fdff;"><div class="tooltip">Terrifying</div></div>

<div class="tier" style="background:#ffffff;" id="catTier">
  <div class="tooltip">
    <span class="catastrophic" id="catLabel">Catastrophic</span>
  </div>
</div>

<div class="tier" style="background:#464646;"><div class="tooltip">Cataclysmic</div></div>
<div class="tier" style="background:#000000;"><div class="tooltip">Eternal</div></div>

</div>

<script>
const cat = document.getElementById("catLabel");

/* =========================
   CATASTROPHIC MOTION
========================= */

let x = 0, y = 0;
let vx = 0, vy = 0;

function update() {
  vx += (Math.random() - 0.5) * 1.7;
  vy += (Math.random() - 0.5) * 1.7;

  vx *= 0.82;
  vy *= 0.82;

  if (Math.random() < 0.06) {
    vx += (Math.random() - 0.5) * 8;
    vy += (Math.random() - 0.5) * 8;
  }

  x += vx;
  y += vy;

  x = Math.max(-7, Math.min(7, x));
  y = Math.max(-7, Math.min(7, y));

  cat.style.transform = `translate(${x}px, ${y}px)`;
}

setInterval(update, 16);

/* =========================
   TRAIL SYSTEM
========================= */

function spawnTrail() {
  const rect = cat.getBoundingClientRect();

  const ghost = document.createElement("div");
  ghost.className = "trail";
  ghost.innerText = "Catastrophic";

  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";

  ghost.style.transform = `translate(${x}px, ${y}px)`;
  ghost.style.color = `hsl(${Math.random() * 360}, 100%, 70%)`;

  document.body.appendChild(ghost);

  setTimeout(() => ghost.style.opacity = 0, 20);
  setTimeout(() => ghost.remove(), 250);
}

setInterval(spawnTrail, 65);

</script>

</body>
</html>
