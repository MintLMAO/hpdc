<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Difficulty Chart</title>

<style>
body {
  margin: 0;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: Arial, sans-serif;
}

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

.tier {
  height: 70px;
  position: relative;
  cursor: pointer;
  overflow: visible;
  transition: transform 0.15s ease;
}

.tier:hover {
  transform: scale(1.03);
  z-index: 5;
}

/* TOOLTIP */
.tooltip {
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translate(0px, -50%);
  opacity: 0;

  background: rgba(0,0,0,0.85);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;

  pointer-events: none;

  transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.2, 1),
              opacity 0.2s ease;
}

.tier:hover .tooltip {
  opacity: 1;
  transform: translate(-120%, -50%);
}

/* TEXT EFFECTS */
.label {
  display: inline-block;
}

.intense {
  animation: flash 0.4s ease;
}

@keyframes flash {
  0% { filter: brightness(1); }
  50% { filter: brightness(2.5); }
  100% { filter: brightness(1); }
}

.severe {
  animation: pulseOnce 0.6s ease;
}

@keyframes pulseOnce {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.remorseless {
  animation: pulseLoop 1.5s infinite;
}

@keyframes pulseLoop {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* CATASTROPHIC */
.catastrophic {
  display: inline-block;
  position: relative;
  z-index: 1000;
  font-weight: bold;
  text-shadow: 0 0 8px rgba(255,255,255,0.6);
}

/* TRAIL */
.trail {
  position: fixed;
  pointer-events: none;
  opacity: 0.9;
  z-index: 999;
  animation: fadeTrail 0.6s linear forwards;
  filter: blur(0.5px);
}

@keyframes fadeTrail {
  0% { opacity: 0.9; transform: translate(0,0); }
  100% { opacity: 0; transform: translate(0,-6px); }
}

</style>
</head>

<body>

<div class="chart">

<!-- (unchanged tiers above) -->

<div class="tier" style="background:#ffffff;" id="catTier" onclick="go('catastrophic.html')">
  <div class="tooltip">
    <span class="label catastrophic" id="catLabel">Catastrophic</span>
  </div>
</div>

<!-- (rest unchanged) -->

</div>

<script>
function go(page) {
  window.location.href = page;
}

const cat = document.getElementById("catLabel");
const catTier = document.getElementById("catTier");

let catX = 0;
let catY = 0;
let t = 0;
let hovering = false;

/* =========================
   BALANCED SHAKE
========================= */
function shakeCatastrophic() {
  if (!cat) return;

  t += 0.22;

  const r = 4; // smaller

  catX = Math.sin(t * 2) * r + Math.sin(t * 3.5) * 1.2;
  catY = Math.cos(t * 1.8) * r + Math.cos(t * 3.2) * 1.2;

  cat.style.transform = `translate(${catX}px, ${catY}px)`;
}

setInterval(shakeCatastrophic, 16);

/* =========================
   TRAIL (ONLY WHEN HOVERING)
========================= */
function spawnTrail() {
  if (!cat || !hovering) return;

  const rect = cat.getBoundingClientRect();

  const ghost = document.createElement("span");
  ghost.className = "trail";
  ghost.innerText = "Catastrophic";

  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";

  ghost.style.transform = `translate(${catX}px, ${catY}px)`;

  // brighter colors (no muddy look)
  ghost.style.color = `hsl(${Math.random() * 360}, 100%, 75%)`;

  document.body.appendChild(ghost);

  setTimeout(() => ghost.remove(), 600);
}

setInterval(spawnTrail, 180);

/* =========================
   HOVER DETECTION
========================= */
catTier.addEventListener("mouseenter", () => hovering = true);
catTier.addEventListener("mouseleave", () => hovering = false);

</script>

</body>
</html>
