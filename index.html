<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Difficulty Chart</title>

<style>
body {
  margin: 0;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: Arial, sans-serif;
}

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

/* =========================
   TIER (NO EFFECTS)
========================= */
.tier {
  height: 70px;
  position: relative;
  cursor: pointer;
  overflow: visible;
  transition: transform 0.15s ease;
}

.tier:hover {
  transform: scale(1.03);
  z-index: 5;
}

/* =========================
   TOOLTIP POSITIONING
========================= */
.tooltip {
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translate(0px, -50%);
  opacity: 0;

  background: rgba(0,0,0,0.85);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;

  pointer-events: none;

  transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.2, 1),
              opacity 0.2s ease;
}

.tier:hover .tooltip {
  opacity: 1;
  transform: translate(-120%, -50%);
}

/* =========================
   INNER LABEL (TEXT ONLY)
========================= */
.label {
  display: inline-block;
}

/* =========================
   INTENSE - FLASH
========================= */
.intense {
  animation: flash 0.4s ease;
}

@keyframes flash {
  0% { filter: brightness(1); }
  50% { filter: brightness(2.5); }
  100% { filter: brightness(1); }
}

/* =========================
   SEVERE - BOLD FLASH ON ENTRY
========================= */
.severe {
  animation: pulseOnce 0.6s ease;
}

@keyframes pulseOnce {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* =========================
   REMORSELESS - CONSTANT PULSE
========================= */
.remorseless {
  animation: pulseLoop 1.5s infinite;
}

@keyframes pulseLoop {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* =========================
   CATASTROPHIC - TEXT SHAKE + TRAIL FEEL
========================= */
.catastrophic {
  animation: textShake 0.12s infinite;
}

@keyframes textShake {
  0% { transform: translate(0,0); }
  25% { transform: translate(1px,-1px); }
  50% { transform: translate(-1px,1px); }
  75% { transform: translate(1px,1px); }
  100% { transform: translate(0,0); }
}

</style>
</head>

<body>

<div class="chart">
