<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Difficulty Chart</title>

<style>
body {
  margin: 0;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: Arial, sans-serif;
}

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

/* =========================
   TIER (NO EFFECTS)
========================= */
.tier {
  height: 70px;
  position: relative;
  cursor: pointer;
  overflow: visible;
  transition: transform 0.15s ease;
}

.tier:hover {
  transform: scale(1.03);
  z-index: 5;
}

/* =========================
   TOOLTIP (SLIDES LEFT OUTSIDE)
========================= */
.tooltip {
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translate(0px, -50%);
  opacity: 0;

  background: rgba(0,0,0,0.85);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;

  pointer-events: none;

  transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.2, 1),
              opacity 0.2s ease;
}

.tier:hover .tooltip {
  opacity: 1;
  transform: translate(-120%, -50%);
}

/* =========================
   TEXT EFFECT BASE
========================= */
.label {
  display: inline-block;
}

/* INTENSE */
.intense {
  animation: flash 0.4s ease;
}

@keyframes flash {
  0% { filter: brightness(1); }
  50% { filter: brightness(2.5); }
  100% { filter: brightness(1); }
}

/* SEVERE */
.severe {
  animation: pulseOnce 0.6s ease;
}

@keyframes pulseOnce {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* REMORSELESS */
.remorseless {
  animation: pulseLoop 1.5s infinite;
}

@keyframes pulseLoop {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* =========================
   CATASTROPHIC (VIOLENT + TRAIL)
========================= */
.catastrophic {
  display: inline-block;
  position: relative;
  animation: violentShake 0.05s infinite;
}

@keyframes violentShake {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px,-2px); }
  50% { transform: translate(-3px,2px); }
  75% { transform: translate(3px,3px); }
  100% { transform: translate(-2px,-3px); }
}

/* trail ghost */
.trail {
  position: absolute;
  left: 0;
  top: 0;
  pointer-events: none;
  opacity: 0.7;
  animation: fadeTrail 0.6s linear forwards;
}

@keyframes fadeTrail {
  0% { opacity: 0.7; transform: translate(0,0); }
  100% { opacity: 0; transform: translate(0,-10px); }
}

</style>
</head>

<body>

<div class="chart">

<div class="tier" style="background:#208217;" onclick="go('effortless.html')">
  <div class="tooltip"><span class="label">Effortless</span></div>
</div>

<div class="tier" style="background:#649f1d;" onclick="go('cakewalk.html')">
  <div class="tooltip"><span class="label">Cakewalk</span></div>
</div>

<div class="tier" style="background:#91b91b;" onclick="go('simple.html')">
  <div class="tooltip"><span class="label">Simple</span></div>
</div>

<div class="tier" style="background:#b3cd22;" onclick="go('easy.html')">
  <div class="tooltip"><span class="label">Easy</span></div>
</div>

<div class="tier" style="background:#d9d81c;" onclick="go('moderate.html')">
  <div class="tooltip"><span class="label">Moderate</span></div>
</div>

<div class="tier" style="background:#d9ba1c;" onclick="go('medium.html')">
  <div class="tooltip"><span class="label">Medium</span></div>
</div>

<div class="tier" style="background:#d99a1d;" onclick="go('advanced.html')">
  <div class="tooltip"><span class="label">Advanced</span></div>
</div>

<div class="tier" style="background:#d9861c;" onclick="go('challenging.html')">
  <div class="tooltip"><span class="label">Challenging</span></div>
</div>

<div class="tier" style="background:#d8691d;" onclick="go('difficult.html')">
  <div class="tooltip"><span class="label">Difficult</span></div>
</div>

<div class="tier" style="background:#f13d01;" onclick="go('hard.html')">
  <div class="tooltip"><span class="label">Hard</span></div>
</div>

<div class="tier" style="background:#a30800;" onclick="go('intense.html')">
  <div class="tooltip"><span class="label intense">Intense</span></div>
</div>

<div class="tier" style="background:#3d0301;" onclick="go('severe.html')">
  <div class="tooltip"><span class="label severe">Severe</span></div>
</div>

<div class="tier" style="background:#fe01d3;" onclick="go('remorseless.html')">
  <div class="tooltip"><span class="label remorseless">Remorseless</span></div>
</div>

<div class="tier" style="background:#8b0097;" onclick="go('vigorous.html')">
  <div class="tooltip"><span class="label">Vigorous</span></div>
</div>

<div class="tier" style="background:#3e0052;" onclick="go('savage.html')">
  <div class="tooltip"><span class="label">Savage</span></div>
</div>

<div class="tier" style="background:#2734ff;" onclick="go('insane.html')">
  <div class="tooltip"><span class="label">Insane</span></div>
</div>

<div class="tier" style="background:#2888ff;" onclick="go('extreme.html')">
  <div class="tooltip"><span class="label">Extreme</span></div>
</div>

<div class="tier" style="background:#00ff99;" onclick="go('absurd.html')">
  <div class="tooltip"><span class="label">Absurd</span></div>
</div>

<div class="tier" style="background:#28fdff;" onclick="go('terrifying.html')">
  <div class="tooltip"><span class="label">Terrifying</span></div>
</div>

<div class="tier" style="background:#ffffff;" onclick="go('catastrophic.html')">
  <div class="tooltip"><span class="label catastrophic" id="catLabel">Catastrophic</span></div>
</div>

<div class="tier" style="background:#464646;" onclick="go('cataclysmic.html')">
  <div class="tooltip"><span class="label">Cataclysmic</span></div>
</div>

<div class="tier" style="background:#000000; border:2px solid #ffc704;" onclick="go('eternal.html')">
  <div class="tooltip"><span class="label">Eternal</span></div>
</div>

</div>

<script>
function go(page) {
  window.location.href = page;
}

/* =========================
   CATASTROPHIC TRAIL SYSTEM
========================= */
const cat = document.getElementById("catLabel");

function spawnTrail() {
  if (!cat) return;

  const ghost = document.createElement("span");
  ghost.className = "trail";
  ghost.innerText = "Catastrophic";

  ghost.style.left = "0px";
  ghost.style.top = "0px";

  ghost.style.color = `hsl(${Math.random() * 360}, 100%, 60%)`;

  cat.parentElement.appendChild(ghost);

  setTimeout(() => ghost.remove(), 600);
}

setInterval(spawnTrail, 200);
</script>

</body>
</html>
