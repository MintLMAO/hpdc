<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Difficulty Chart</title>

<style>
body {
  margin: 0;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: Arial, sans-serif;
}

.chart {
  width: 240px;
  display: flex;
  flex-direction: column;
}

.tier {
  height: 70px;
  position: relative;
  cursor: pointer;
  overflow: visible;
  transition: transform 0.15s ease;
}

.tier:hover {
  transform: scale(1.03);
  z-index: 5;
}

/* TOOLTIP */
.tooltip {
  position: absolute;
  right: 100%;
  top: 50%;
  transform: translate(0px, -50%);
  opacity: 0;
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  transition: transform 0.25s cubic-bezier(0.2,0.9,0.2,1),
              opacity 0.2s ease;
}

.tier:hover .tooltip {
  opacity: 1;
  transform: translate(-120%, -50%);
}

.label {
  display: inline-block;
}

/* =========================
   EFFECTS
========================= */

/* INTENSE */
.intense {
  animation: intenseFlash 0.2s infinite;
}
@keyframes intenseFlash {
  0%,100% { opacity:1; }
  50% { opacity:0.3; }
}

/* SEVERE */
.severe {
  animation: severePulse 0.6s infinite;
}
@keyframes severePulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

/* REMORSELESS */
.remorseless {
  animation: remorselessPulse 1.2s infinite;
}
@keyframes remorselessPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* VIGOROUS */
.vigorous {
  animation: vigorousShake 0.08s infinite;
}
@keyframes vigorousShake {
  0% { transform: translate(0,0); }
  25% { transform: translate(1px,-1px); }
  50% { transform: translate(-1px,1px); }
  75% { transform: translate(1px,1px); }
  100% { transform: translate(-1px,-1px); }
}

/* SAVAGE */
.savage {
  animation: savageSkew 0.5s infinite alternate;
}
@keyframes savageSkew {
  0% { transform: skew(0deg); }
  100% { transform: skew(10deg); }
}

/* INSANE */
.insane {
  position: relative;
  animation: insaneGlitch 0.2s infinite;
}
@keyframes insaneGlitch {
  0% { text-shadow: 2px 0 red, -2px 0 cyan; }
  50% { text-shadow: -2px 0 red, 2px 0 cyan; }
  100% { text-shadow: 2px 0 red, -2px 0 cyan; }
}

/* EXTREME */
.extreme {
  animation: extremeSpin 1s infinite linear;
}
@keyframes extremeSpin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ABSURD */
.absurd {
  animation: absurdStretch 0.6s infinite;
}
@keyframes absurdStretch {
  0%,100% { transform: scaleY(1); }
  50% { transform: scaleY(1.5); }
}

/* TERRIFYING */
.terrifying {
  animation: terrifyingFade 0.3s infinite;
}
@keyframes terrifyingFade {
  0%,100% { opacity:1; }
  50% { opacity:0.2; }
}

/* CATASTROPHIC (kept your system) */
.catastrophic {
  position: relative;
  z-index: 1000;
  font-weight: bold;
}

/* CATACLYSMIC */
.cataclysmic {
  animation: cataclysmicDrift 2s infinite;
}
@keyframes cataclysmicDrift {
  0% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.1) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); }
}

/* ETERNAL */
.eternal {
  animation: eternalGlow 2s infinite;
}
@keyframes eternalGlow {
  0%,100% { text-shadow: 0 0 5px gold; }
  50% { text-shadow: 0 0 20px gold; }
}

/* TRAIL */
.trail {
  position: fixed;
  pointer-events: none;
  opacity: 0.85;
  z-index: 999;
  filter: blur(0.4px);
}

</style>
</head>

<body>

<div class="chart">

<!-- (shortened earlier tiers for clarity) -->

<div class="tier" style="background:#a30800;">
  <div class="tooltip"><span class="label intense">Intense</span></div>
</div>

<div class="tier" style="background:#3d0301;">
  <div class="tooltip"><span class="label severe">Severe</span></div>
</div>

<div class="tier" style="background:#fe01d3;">
  <div class="tooltip"><span class="label remorseless">Remorseless</span></div>
</div>

<div class="tier" style="background:#8b0097;">
  <div class="tooltip"><span class="label vigorous">Vigorous</span></div>
</div>

<div class="tier" style="background:#3e0052;">
  <div class="tooltip"><span class="label savage">Savage</span></div>
</div>

<div class="tier" style="background:#2734ff;">
  <div class="tooltip"><span class="label insane">Insane</span></div>
</div>

<div class="tier" style="background:#2888ff;">
  <div class="tooltip"><span class="label extreme">Extreme</span></div>
</div>

<div class="tier" style="background:#00ff99;">
  <div class="tooltip"><span class="label absurd">Absurd</span></div>
</div>

<div class="tier" style="background:#28fdff;">
  <div class="tooltip"><span class="label terrifying">Terrifying</span></div>
</div>

<div class="tier" style="background:#ffffff;" id="catTier">
  <div class="tooltip">
    <span class="label catastrophic" id="catLabel">Catastrophic</span>
  </div>
</div>

<div class="tier" style="background:#464646;">
  <div class="tooltip"><span class="label cataclysmic">Cataclysmic</span></div>
</div>

<div class="tier" style="background:#000000;">
  <div class="tooltip"><span class="label eternal">Eternal</span></div>
</div>

</div>

<script>
const cat = document.getElementById("catLabel");
const catTier = document.getElementById("catTier");

let catX = 0, catY = 0, t = 0, hovering = false;

function shake() {
  t += 0.22;
  catX = Math.sin(t*2)*4;
  catY = Math.cos(t*1.8)*4;
  cat.style.transform = `translate(${catX}px, ${catY}px)`;
}
setInterval(shake, 16);

function trail() {
  if (!hovering) return;

  const rect = cat.getBoundingClientRect();
  const ghost = document.createElement("span");
  ghost.className = "trail";
  ghost.innerText = "Catastrophic";

  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";
  ghost.style.transform = `translate(${catX}px, ${catY}px)`;
  ghost.style.color = `hsl(${Math.random()*360},100%,75%)`;

  document.body.appendChild(ghost);
  setTimeout(()=>ghost.remove(), 40);
}
setInterval(trail, 80);

catTier.addEventListener("mouseenter", ()=>hovering=true);
catTier.addEventListener("mouseleave", ()=>hovering=false);
</script>

</body>
</html>
