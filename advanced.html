<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced</title>

<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Overpass',sans-serif;
  color:white;
  background:#0f0f14;
  overflow:hidden;
}

/* sharper directional flow */
.bg {
  position:fixed;
  inset:0;
  background:
    linear-gradient(120deg, rgba(255,150,60,0.15), transparent 60%),
    radial-gradient(circle at 70% 30%, rgba(255,180,100,0.25), transparent 50%);
  filter:blur(16px);
  animation:slide 3.5s linear infinite;
  z-index:-1;
}

@keyframes slide {
  0% { transform:translate(0,0) }
  100% { transform:translate(-30px,-20px) }
}

.container { max-width:700px; margin:auto; padding:60px 30px; }

.card {
  background:rgba(255,255,255,0.04);
  border-radius:18px;
  padding:30px;
  backdrop-filter:blur(10px);
}

a { color:rgba(255,255,255,0.7); text-decoration:none }
a:hover { color:white }

.tag {
  margin-top:10px;
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,150,60,0.25);
}
</style>
</head>

<body>
<div class="bg"></div>

<div class="container">
<a href="index.html">← Back</a>

<div class="card">
<h1>Advanced</h1>
<div class="tag">Tier: 2 (Baseline)</div>

<p>Requires consistent control and precision. Movement must be deliberate.</p>

<ul><li>Parkour 7</li></ul>
</div>
</div>

</body>
</html>
